<!doctype html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <title>Barry Anders</title>
  <meta name="description" content="Free apps by Barry Anders, including MailPaw, a free privacy-first email template builder, and Siggy, a professional email signature generator for Gmail, Outlook, Apple Mail, and others.">
  <link rel="icon" href="https://avatars.githubusercontent.com/u/91902180?s=64">
  <link href="/preflight.css" rel="stylesheet">
  <style>
    /* Layout */
    html { font: calc(12px + (13.5 - 12) * ((100vw - 320px) / (960 - 320))) Helvetica Neue, Helvetica, Arial, sans-serif; }
    body {
      min-width: 240px;
      margin: 1.5rem;
      background: #ebebeb;
      color: #121212;
    }
    header, footer {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header h1 {
      margin-bottom: 0;
    }
    main {
      padding: 1.5rem;
      background-color: #ffffff;
      box-shadow: rgba(9, 30, 66, 0.25) 0px 4px 8px -2px, rgba(9, 30, 66, 0.08) 0px 0px 0px 1px;
    }

    .magic-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(16rem, 100%), 1fr));
      grid-gap: 1.5rem;
    }
    .magic-grid\:center {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(16rem, 100%), 1fr));
      grid-gap: 1.5rem;
      margin: 0 auto;
    }

    /* Typography */
    h1, .h1 { font-size: 400%; }
    h2, .h2 { font-size: 280%; }
    h3, .h3 { font-size: 200%; }
    h4, .h4 { font-size: 140%; }
    h5, .h5 { font-size: 125%; }

    /* Utilities */
    .contain { max-width: 960px; }
    .aspect-ratio\:16x9 {
      width: 100%;
      height: auto;
      aspect-ratio: 16/9;
    }

    .spacing\:1 > * { margin: 1.5rem auto; }
    .spacing\:1:not(body) > *:first-child { margin: 0 auto 1.5rem auto; }
    .spacing\:1:not(body) > *:last-child { margin: 1.5rem auto 0 auto; }
    .spacing\:2 > * { margin: 2.25rem auto; }
    .spacing\:2:not(body) > *:first-child { margin: 0 auto 3rem auto; }
    .spacing\:2:not(body) > *:last-child { margin: 3rem auto 0 auto; }

    .border\:round { border-radius: 0.5rem; }

    .shape\:circle { border-radius: 50%; }
    .shape\:hex { clip-path: url(#shape-hex); }

    /* Components */
    .button {
      align-items: center;
      background-color: #ffffff;
      border-radius: 0.75rem;
      box-shadow: rgba(0, 0, 0, 0.12) 0px 1px 3px, rgba(0, 0, 0, 0.24) 0px 1px 2px;
      box-sizing: border-box;
      color: #121212;
      cursor: pointer;
      display: inline-flex;
      flex: 1 1 auto;
      font-size: 120%;
      font-weight: 500;
      justify-content: center;
      line-height: 1;
      margin: 0;
      outline: none;
      padding: 1rem 1.2rem;
      text-align: center;
      text-decoration: none;
      white-space: nowrap;
      border: 0;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      transition: box-shadow .2s;
    }
    .button:hover { box-shadow: #121212 0 0 0 2px, transparent 0 0 0 0; transition: none; }
    .video { border-radius: 0.75rem; }

    /* IDs */
    #avatar {
      width: 8rem;
      height: 8rem;
      background-color: #d3d3d3;
      color: transparent;
    }
    .app-entry {
      position: relative;
    }
    .app-card {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 1.25rem 3.8rem 1.25rem 1.25rem;
      color: #121212;
      text-decoration: none;
      background: #ffffff;
      border-radius: 0.75rem;
      box-shadow: rgba(9, 30, 66, 0.18) 0px 2px 6px -2px, rgba(9, 30, 66, 0.08) 0px 0px 0px 1px;
      min-height: 6.5rem;
    }
    .app-card:hover { box-shadow: #121212 0 0 0 2px, transparent 0 0 0 0; }
    .app-card img {
      width: 4rem;
      height: 4rem;
      border-radius: 1rem;
      flex: 0 0 auto;
    }
    .app-mark {
      align-items: center;
      background: #111827;
      border-radius: 1rem;
      color: #ffffff;
      display: inline-flex;
      flex: 0 0 auto;
      font-size: 1.15rem;
      font-weight: 900;
      height: 4rem;
      justify-content: center;
      letter-spacing: -0.08em;
      width: 4rem;
    }
    .app-card h3 { margin: 0 0 0.5rem; }
    .app-card p { line-height: 1.45; }
    .source-link {
      align-items: center;
      background: #ffffff;
      border-radius: 999px;
      box-shadow: rgba(9, 30, 66, 0.14) 0 1px 4px, rgba(9, 30, 66, 0.08) 0 0 0 1px;
      color: #121212;
      display: inline-flex;
      height: 2.6rem;
      justify-content: center;
      position: absolute;
      right: 1rem;
      text-decoration: none;
      top: 1rem;
      width: 2.6rem;
      z-index: 2;
    }
    .source-link:hover { box-shadow: #121212 0 0 0 2px, transparent 0 0 0 0; }
    .source-link.code-link {
      background: #ffffff;
      color: #6b7280;
    }
    .source-link svg {
      height: 1.35rem;
      width: 1.35rem;
    }
    .coffee-link {
      align-items: center;
      background: #fff5dc;
      border: 1px solid #f2d792;
      border-radius: 999px;
      box-shadow: rgba(96, 67, 25, 0.18) 0 10px 24px -18px, rgba(96, 67, 25, 0.12) 0 0 0 1px;
      color: #201714;
      display: inline-flex;
      font-size: 112%;
      font-weight: 700;
      gap: 0.55rem;
      justify-content: center;
      line-height: 1;
      margin-top: 0.75rem;
      padding: 0.95rem 1.2rem;
      text-decoration: none;
      width: 100%;
    }
    .coffee-link:hover { box-shadow: #201714 0 0 0 2px, transparent 0 0 0 0; }
    .coffee-icon {
      align-items: center;
      background: #f7c45b;
      border-radius: 999px;
      display: inline-flex;
      height: 1.8rem;
      justify-content: center;
      width: 1.8rem;
    }

    @media (max-width: 420px) {
      body { margin: 1.25rem; }
      main { padding: 1.25rem; }
      .app-card {
        align-items: flex-start;
        padding: 1rem 3.4rem 1rem 1rem;
      }
      .app-card img {
        width: 3.5rem;
        height: 3.5rem;
        border-radius: 0.85rem;
      }
      .app-mark {
        width: 3.5rem;
        height: 3.5rem;
        border-radius: 0.85rem;
      }
      .source-link {
        height: 2.35rem;
        right: 0.75rem;
        top: 0.75rem;
        width: 2.35rem;
      }
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #141414;
        color: #f4f0ea;
      }
      main {
        background-color: #202020;
        box-shadow: rgba(0, 0, 0, 0.45) 0px 12px 32px -18px, rgba(255, 255, 255, 0.1) 0px 0px 0px 1px;
      }
      .button {
        background-color: #2a2a2a;
        color: #f4f0ea;
        box-shadow: rgba(0, 0, 0, 0.3) 0px 1px 3px, rgba(255, 255, 255, 0.1) 0px 0px 0px 1px;
      }
      .button:hover { box-shadow: #f4f0ea 0 0 0 2px, transparent 0 0 0 0; }
      .app-card {
        background: #2a2a2a;
        color: #f4f0ea;
        box-shadow: rgba(0, 0, 0, 0.32) 0px 10px 24px -18px, rgba(255, 255, 255, 0.12) 0px 0px 0px 1px;
      }
      .app-card:hover { box-shadow: #f4f0ea 0 0 0 2px, transparent 0 0 0 0; }
      .source-link {
        background: #f4f0ea;
        color: #161616;
        box-shadow: rgba(0, 0, 0, 0.32) 0 1px 4px, rgba(255, 255, 255, 0.12) 0 0 0 1px;
      }
      .source-link.code-link {
        background: #f4f0ea;
        color: #161616;
      }
      .source-link:hover { box-shadow: #f4f0ea 0 0 0 2px, transparent 0 0 0 0; }
      .coffee-link {
        background: #f3c85f;
        border-color: #ffd978;
        color: #1c1610;
        box-shadow: rgba(0, 0, 0, 0.35) 0 12px 30px -18px, rgba(255, 217, 120, 0.28) 0 0 0 1px;
      }
      .coffee-link:hover { box-shadow: #ffd978 0 0 0 2px, transparent 0 0 0 0; }
      .coffee-icon { background: #fff0bd; }
    }
  </style>
</head>
